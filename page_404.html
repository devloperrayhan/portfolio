<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERROR-404</title>
    <link rel="shortcut icon" href="./image/developerrayhan.png" type="image/x-icon">
    <style>
        *{
            margin: 0px;
            padding: 0px;
            font-family: sans-serif;
        }
        section{
            height: 98vh;
            width: 98vw;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h1{
            font-size: 35px;
        }
        p{
            font-size: 20px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        a{
            text-decoration: none;
            font-size: 18px;
            border: 1px solid #000;
            background-color: #000;
            padding: 10px 15px 10px 15px;
            color: #FFF;
            transition: all 0.5s;
        }
        a:hover{
            background-color: #fff;
            border-color: #000;
            color: #000;
        }
    </style>
</head>
<body>
    <section>
        <h1>ERROR 404</h1>
        <p>Page Not Found.</p>
        <a href="./index.html">Go Back</a>
    </section>
</body>
</html>
